name: Deploy Backend

# Self-hosted-runner deploy. Pushes to main that touch backend code or
# migrations run scripts/deploy-host.sh directly ON the ThinkPad — no SSH,
# no Tailscale, no remote-shell quoting.
#
# Runner setup (one-time, already done): `scripts/_install-gh-runner.sh`
# registered a runner tagged [self-hosted, archive-wsl] under PM2 as
# `gh-runner-archive-wsl`. It survives reboots via `pm2 save` and the
# existing PM2 startup config.
#
# Why self-hosted: the prior attempt used `ssh -i <key>` over Tailscale
# from a github-hosted runner. Tailscale SSH enforces device-approval auth
# that GitHub Actions cannot satisfy (browser click), and the heredoc
# transport hung. Self-hosted runners connect OUT to GitHub on 443 — no
# inbound auth surface, jobs execute locally where they need to run anyway.

on:
  push:
    branches: [main]
    paths:
      - 'packages/api/**'
      - 'packages/indexer/**'
      - 'packages/evaluator/**'
      - 'packages/shared/**'
      - 'migrations/**'
      - 'migrations-archiveagents/**'
      - 'scripts/**'
      - 'ecosystem.thinkpad.config.cjs'
      - 'pnpm-lock.yaml'
  workflow_dispatch: # manual trigger from the Actions tab

concurrency:
  # Serialize deploys — never two pulling+building the same checkout
  # simultaneously. Cancel an in-flight deploy if a newer commit lands.
  group: deploy-backend
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: [self-hosted, archive-wsl]
    timeout-minutes: 15
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'

    env:
      DEPLOY_PATH: /home/asbryx/building-arc/agent-hub
      DEPLOY_SHA: ${{ github.sha }}
      DEPLOY_REF: ${{ github.ref_name }}

    steps:
      # No checkout step: the runner DOESN'T need a copy of the repo. The
      # deployment is a server-side `git pull` inside DEPLOY_PATH, performed
      # by scripts/deploy-host.sh. The runner just provides the trigger.

      - name: Deploy
        run: bash "${DEPLOY_PATH}/scripts/deploy-host.sh"

      - name: Post-deploy health check
        run: |
          set -euo pipefail
          # Give the api a few seconds to come back up after pm2 reload
          sleep 5
          # /api/health should return 200 with {syncing, liveSync, block}
          curl -sf --max-time 10 http://localhost:3000/api/health | tee /tmp/health.json
          # Tighter assertions belong in the e2e suite — at minimum the
          # response must parse as JSON with a `block` field.
          jq -e '.block' /tmp/health.json > /dev/null
