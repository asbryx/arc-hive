<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
<rect width="64" height="64" fill="#000" rx="8"/>
<!-- Three hexagons in triangular cluster -->
<!-- Top-left hex (outlined) -->
<polygon points="18,12 26,8 34,12 34,20 26,24 18,20" fill="none" stroke="#c8d0d8" stroke-width="2.2"/>
<!-- Top-right hex (outlined) -->
<polygon points="34,12 42,8 50,12 50,20 42,24 34,20" fill="none" stroke="#c8d0d8" stroke-width="2.2"/>
<!-- Bottom-center hex (filled) -->
<polygon points="26,22 34,18 42,22 42,30 34,34 26,30" fill="#c8d0d8" stroke="#c8d0d8" stroke-width="1"/>
<!-- Arc below -->
<path d="M14,42 Q32,32 50,42" fill="none" stroke="#c8d0d8" stroke-width="2.5" stroke-linecap="round"/>
</svg>
